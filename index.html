        :root {
            --bg: #0a0a14;
            --card-bg: #111122;
            --neon-cyan: #00e5ff;

            --radius-btn: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:

                radial-gradient(ellipse at 50% 80%, rgba(251, 191, 36, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            padding: 20px 0;
        }

        .particles-container {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; border-radius: 50%;
            animation: floatUp linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            80% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .main-page {
            position: relative; z-index: 1; width: 100%; max-width: 520px;
            padding: 0 20px; margin: 10px 0;
            animation: fadeSlide 0.7s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 30px 22px 26px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 60px rgba(108, 92, 231, 0.15);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -1px; left: 15%; right: 15%;
            height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-gold), transparent);
            border-radius: 2px;
        }

        .main-heading {
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #b3e5fc, var(--neon-cyan));

            background-clip: text; margin-bottom: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,229,255,0.3);

        .phone-notch {

        @keyframes marqueeScroll {

        /* buttons */

        @media (max-width: 480px) {

        }
    </style>

        (function() {
            const container = document.getElementById('particlesContainer');
            const colors = ['#00e5ff','#b347ea','#fbbf24','#ffffff','#6c5ce7','#10b981'];
            for (let i = 0; i < 55; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 16 + 7) + 's';
                p.style.animationDelay = (Math.random() * 12) + 's';

            }
